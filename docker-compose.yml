services:
  mysql:
    image: mysql:8.4
    container_name: wms-print-template-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-wms_root_password}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-wms_print_template}
      MYSQL_USER: ${MYSQL_USER:-wms_app}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-wms_app_password}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u root -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 5s
      timeout: 5s
      retries: 20

  backend:
    build:
      context: ./backend
    container_name: wms-print-template-backend
    environment:
      PORT: 3001
      NODE_ENV: production
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: ${MYSQL_ROOT_PASSWORD:-wms_root_password}
      DB_NAME: ${MYSQL_DATABASE:-wms_print_template}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://127.0.0.1:8080}
    depends_on:
      mysql:
        condition: service_healthy
    command: sh -c "npm run migrate && npm start"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: /api/v1
    container_name: wms-print-template-frontend
    depends_on:
      - backend

  nginx:
    image: nginx:1.27-alpine
    container_name: wms-print-template-nginx
    ports:
      - "${HTTP_PORT:-8080}:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend

volumes:
  mysql_data:
