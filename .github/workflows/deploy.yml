name: Deploy to Server

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: 47.113.118.74
          username: root
          key: ${{ secrets.WMS_DEPLOY_KEY }}
          command_timeout: 12m
          script: |
            cd /opt/wms-print-template-center

            # Pull latest code (tolerate network flakes)
            git fetch origin main 2>/dev/null || true
            git checkout main
            git pull --ff-only origin main 2>/dev/null || true

            # Determine which services need rebuild
            CHANGED=$(git diff --name-only HEAD~1 2>/dev/null || echo "")
            BUILD_BACKEND=0
            BUILD_FRONTEND=0

            if echo "$CHANGED" | grep -q "^backend/"; then BUILD_BACKEND=1; fi
            if echo "$CHANGED" | grep -q "^frontend/"; then BUILD_FRONTEND=1; fi
            # Always include nginx if its config changed
            if echo "$CHANGED" | grep -q "^nginx/\|^docker-compose"; then BUILD_BACKEND=1; BUILD_FRONTEND=1; fi
            # Default: rebuild all if diff check failed
            if [ -z "$CHANGED" ]; then BUILD_BACKEND=1; BUILD_FRONTEND=1; fi

            if [ "$BUILD_BACKEND" = "1" ] && [ "$BUILD_FRONTEND" = "1" ]; then
              DOCKER_BUILDKIT=1 docker compose up -d --build
            elif [ "$BUILD_BACKEND" = "1" ]; then
              DOCKER_BUILDKIT=1 docker compose up -d --build backend
            elif [ "$BUILD_FRONTEND" = "1" ]; then
              DOCKER_BUILDKIT=1 docker compose up -d --build frontend
            else
              echo "No code changes detected, restarting containers"
              docker compose up -d --force-recreate
            fi

            docker compose ps
            sleep 3
            curl -fsSk https://127.0.0.1/api/v1/health
