upstream wms_frontend {
  server frontend:80;
}

upstream wms_backend {
  server backend:3001;
}

# HTTP → HTTPS redirect
server {
  listen 80;
  server_name customprint.icu www.customprint.icu 47.113.118.74 _;
  return 301 https://$host$request_uri;
}

# HTTPS
server {
  listen 443 ssl;
  http2 on;
  server_name customprint.icu www.customprint.icu 47.113.118.74 _;

  ssl_certificate /etc/letsencrypt/live/customprint.icu/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/customprint.icu/privkey.pem;
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_ciphers HIGH:!aNULL:!MD5;

  client_max_body_size 5m;

  location /api/ {
    proxy_pass http://wms_backend/api/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location / {
    proxy_pass http://wms_frontend;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}
